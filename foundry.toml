[profile.default]
src = 'contracts'
test = 'test/foundry'
out = 'artifacts/contracts'
libs = ['lib']
no_match_path = "contracts/*"
solc_version = '0.8.18'
optimizer = true
optimizer_runs = 500
viaIR = false
eth_rpc_url = "https://eth-mainnet.g.alchemy.com/v2/vevMezCXoFshwV190wQcekYwQflctBeE"

[profile.ci_test]
fork_block_number = 18963715

[profile.ci_sizes]
optimizer_runs = 500
test = 'DO_NOT_COMPILE'

[profile.ci_sizes_ir]
optimizer_runs = 200
test = 'DO_NOT_COMPILE'
viaIR = true

[fuzz]
# temporary workaround while we figure out perf issues + configure different test sets + profiles
runs = 1
max_test_rejects = 9_999_999
[rpc_endpoints]
sepolia = 'https://eth-sepolia.g.alchemy.com/v2/vevMezCXoFshwV190wQcekYwQflctBeE'